<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Battle Room PixiJS Test</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: #172026;
        background: #e7ece8;
      }

      .app-shell {
        display: grid;
        grid-template-columns: 320px 1fr;
        min-height: 100vh;
      }

      .panel {
        padding: 20px;
        border-right: 1px solid #cbd5cf;
        background: #f6f8f4;
      }

      h1 {
        margin: 0 0 18px;
        font-size: 22px;
        line-height: 1.2;
      }

      label {
        display: block;
        margin: 14px 0 6px;
        font-size: 13px;
        font-weight: 700;
      }

      input,
      select {
        width: 100%;
        height: 38px;
        padding: 0 10px;
        border: 1px solid #b7c2bb;
        border-radius: 6px;
        font-size: 14px;
        background: #fff;
      }

      input[type="checkbox"] {
        width: auto;
        height: auto;
        margin: 0 8px 0 0;
      }

      .checkbox-row {
        display: flex;
        align-items: center;
        margin-top: 14px;
        font-size: 13px;
        font-weight: 700;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 16px;
      }

      button {
        height: 38px;
        border: 0;
        border-radius: 6px;
        font-weight: 700;
        cursor: pointer;
        color: #fff;
        background: #1f6f5b;
      }

      button.secondary {
        color: #24312b;
        background: #d7dfd8;
      }

      .status {
        margin-top: 16px;
        padding: 10px;
        border-radius: 6px;
        background: #e8efe9;
        font-size: 13px;
        line-height: 1.5;
      }

      .status strong {
        display: inline-block;
        min-width: 78px;
      }

      .status-card {
        margin-top: 10px;
        padding: 10px;
        border: 1px solid #cbd5cf;
        border-radius: 4px;
        background: #f8fbf8;
        box-shadow: 0 4px 14px rgba(23, 32, 38, 0.08);
        font-size: 13px;
        line-height: 1.5;
      }

      .status-card strong {
        display: block;
        margin-bottom: 4px;
      }

      .status-grid {
        display: grid;
        grid-template-columns: 78px 1fr;
        gap: 3px 8px;
      }

      .status-grid span:nth-child(even) {
        min-width: 0;
        overflow-wrap: anywhere;
      }

      .stats-card {
        position: absolute;
        left: 16px;
        top: 16px;
        z-index: 2;
        width: 220px;
        padding: 10px;
        border: 2px solid #1f6f5b;
        border-radius: 4px;
        background: #f8fbf8;
        box-shadow: 0 8px 22px rgba(23, 32, 38, 0.14);
        font-size: 13px;
        line-height: 1.45;
      }

      .target-card {
        position: absolute;
        display: none;
        right: 16px;
        top: 16px;
        z-index: 2;
        width: 240px;
        padding: 10px;
        border: 2px solid #ef4444;
        border-radius: 4px;
        background: #f8fbf8;
        box-shadow: 0 8px 22px rgba(23, 32, 38, 0.14);
        font-size: 13px;
        line-height: 1.45;
      }

      .target-card strong {
        display: block;
        margin-bottom: 4px;
      }

      .stats-card strong {
        display: block;
        margin-bottom: 4px;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 4px 8px;
      }

      .hint {
        margin-top: 14px;
        color: #516057;
        font-size: 13px;
        line-height: 1.5;
      }

      .viewport {
        position: relative;
        min-width: 0;
        overflow: hidden;
        background: #9eb89f;
      }

      #stage {
        width: 100%;
        height: 100vh;
      }

      @media (max-width: 760px) {
        .app-shell {
          grid-template-columns: 1fr;
        }

        .panel {
          border-right: 0;
          border-bottom: 1px solid #cbd5cf;
        }

        #stage {
          height: 70vh;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <aside class="panel">
        <h1>2D Battle Room</h1>

        <label for="serverUrl">WebSocket</label>
        <input id="serverUrl" />

        <label for="roomId">Room ID</label>
        <input id="roomId" value="demo-room" />

        <label for="playerId">Player ID</label>
        <input id="playerId" />

        <label for="heroId">Hero</label>
        <select id="heroId">
          <option value="warrior">Warrior</option>
          <option value="archer">Archer</option>
          <option value="tank">Tank</option>
        </select>

        <label for="team">Team</label>
        <select id="team">
          <option value="blue">Blue</option>
          <option value="red">Red</option>
        </select>

        <label class="checkbox-row">
          <input id="showDummies" type="checkbox" />
          Show Dummies
        </label>

        <div class="actions">
          <button id="connectBtn">Connect</button>
          <button id="leaveBtn" class="secondary">Leave</button>
        </div>

        <div class="status">
          <div><strong>Status</strong><span id="status">Disconnected</span></div>
          <div><strong>Tick</strong><span id="tick">0</span></div>
          <div><strong>Players</strong><span id="playerCount">0</span></div>
        </div>

        <div class="status-card">
          <strong>Player</strong>
          <div class="status-grid">
            <span>Team</span><span id="teamLabel">-</span>
            <span>Position</span><span id="position">-</span>
            <span>Skills</span><span id="skills">-</span>
          </div>
        </div>

        <p class="hint">Right-click the map to move. Left-click an enemy unit to auto attack. Press Q/W/E/R to cast active skills.</p>
      </aside>

      <main class="viewport">
        <div class="stats-card">
          <strong>Stats</strong>
          <div class="stats-grid">
            <span>Level</span><span id="statLevel">-</span>
            <span>EXP</span><span id="statExp">-</span>
            <span>HP</span><span id="statHp">-</span>
            <span>MP</span><span id="statMp">-</span>
            <span>ATK</span><span id="statAttack">-</span>
            <span>Phys DEF</span><span id="statPhysicalDefense">-</span>
            <span>Magic DEF</span><span id="statMagicDefense">-</span>
            <span>Move SPD</span><span id="statMoveSpeed">-</span>
            <span>ATK Range</span><span id="statAttackRange">-</span>
            <span>ATK SPD</span><span id="statAttackSpeed">-</span>
          </div>
        </div>
        <div class="target-card">
          <strong>Target</strong>
          <span id="target">-</span>
        </div>
        <div id="stage"></div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/pixi.js@8.2.6/dist/pixi.min.js"></script>
    <script>
      const state = {
        socket: null,
        roomId: "demo-room",
        playerId: `p-${Math.floor(Math.random() * 10000)}`,
        team: "blue",
        showDummies: false,
        seq: 0,
        map: { width: 2000, height: 2000 },
        players: new Map(),
        units: new Map(),
        sprites: new Map(),
        unitSprites: new Map(),
        damageTexts: [],
        moveTarget: null,
        selectedTargetId: "",
        attackTargetId: "",
        attackMoveArmed: false,
        attackFlashUntil: 0,
        frame: { scale: 1, offsetX: 0, offsetY: 0 },
      };

      const els = {
        serverUrl: document.querySelector("#serverUrl"),
        roomId: document.querySelector("#roomId"),
        playerId: document.querySelector("#playerId"),
        heroId: document.querySelector("#heroId"),
        team: document.querySelector("#team"),
        showDummies: document.querySelector("#showDummies"),
        connectBtn: document.querySelector("#connectBtn"),
        leaveBtn: document.querySelector("#leaveBtn"),
        status: document.querySelector("#status"),
        tick: document.querySelector("#tick"),
        playerCount: document.querySelector("#playerCount"),
        teamLabel: document.querySelector("#teamLabel"),
        position: document.querySelector("#position"),
        statLevel: document.querySelector("#statLevel"),
        statExp: document.querySelector("#statExp"),
        statHp: document.querySelector("#statHp"),
        statMp: document.querySelector("#statMp"),
        statAttack: document.querySelector("#statAttack"),
        statPhysicalDefense: document.querySelector("#statPhysicalDefense"),
        statMagicDefense: document.querySelector("#statMagicDefense"),
        statMoveSpeed: document.querySelector("#statMoveSpeed"),
        statAttackRange: document.querySelector("#statAttackRange"),
        statAttackSpeed: document.querySelector("#statAttackSpeed"),
        target: document.querySelector("#target"),
        skills: document.querySelector("#skills"),
        stage: document.querySelector("#stage"),
      };

      const heroSkillSlots = {
        warrior: {
          passive: "warrior_toughness",
          q: "slash",
          w: "dash",
          e: "battle_cry",
          r: "whirlwind",
        },
        archer: {
          passive: "archer_focus",
          q: "shot",
          w: "roll",
          e: "trap",
          r: "arrow_rain",
        },
        tank: {
          passive: "tank_armor",
          q: "slam",
          w: "guard",
          e: "taunt",
          r: "earthquake",
        },
      };

      els.playerId.value = state.playerId;
      els.serverUrl.value = websocketURL();

      const app = new PIXI.Application();
      const worldLayer = new PIXI.Container();
      const gridLayer = new PIXI.Graphics();
      const unitLayer = new PIXI.Container();
      const playerLayer = new PIXI.Container();
      const effectLayer = new PIXI.Container();

      async function bootPixi() {
        await app.init({
          resizeTo: els.stage,
          antialias: true,
          backgroundColor: 0x9eb89f,
        });
        els.stage.appendChild(app.canvas);
        app.stage.addChild(worldLayer);
        worldLayer.addChild(gridLayer);
        worldLayer.addChild(unitLayer);
        worldLayer.addChild(playerLayer);
        worldLayer.addChild(effectLayer);
        app.ticker.add(draw);
        app.canvas.addEventListener("contextmenu", (event) => {
          event.preventDefault();
        });
        app.canvas.addEventListener("pointerdown", handlePointerDown);
      }

      function connect() {
        if (state.socket?.readyState === WebSocket.OPEN) {
          return;
        }

        state.roomId = els.roomId.value.trim() || "demo-room";
        state.playerId = els.playerId.value.trim() || state.playerId;
        state.team = els.team.value;
        els.serverUrl.value = els.serverUrl.value.trim() || websocketURL();
        els.playerId.value = state.playerId;

        const socket = new WebSocket(els.serverUrl.value.trim());
        state.socket = socket;
        setStatus("Connecting");

        socket.addEventListener("open", () => {
          setStatus("Connected");
          sendPacket("join_room", {
            roomId: state.roomId,
            playerId: state.playerId,
            heroId: els.heroId.value,
            team: state.team,
          });
        });

        socket.addEventListener("message", (event) => {
          const packet = JSON.parse(event.data);
          if (packet.type === "snapshot") {
            applySnapshot(packet.payload);
          }
          if (packet.type === "error") {
            setStatus(packet.payload?.message || "Server error");
          }
        });

        socket.addEventListener("close", () => setStatus("Disconnected"));
        socket.addEventListener("error", () => setStatus("Connection error"));
      }

      function applySnapshot(snapshot) {
        const previousUnits = state.units;
        state.map = snapshot.map;
        state.players = new Map(
          snapshot.players.map((player) => [
            player.playerId,
            normalizePlayer(player),
          ]),
        );
        state.showDummies = els.showDummies.checked;
        const units = visibleUnits(snapshot);
        state.units = new Map(
          units.map((unit) => [unit.id, normalizeUnit(unit)]),
        );
        if (state.selectedTargetId && !state.units.has(state.selectedTargetId)) {
          state.selectedTargetId = "";
        }
        if (state.attackTargetId && !state.units.has(state.attackTargetId)) {
          state.attackTargetId = "";
        }
        updateAttackEffects(previousUnits);
        els.tick.textContent = snapshot.tick;
        els.playerCount.textContent = snapshot.players.length;
        updatePositionLabel();
      }

      function updateAttackEffects(previousUnits) {
        if (!state.attackTargetId) {
          return;
        }
        const previous = previousUnits.get(state.attackTargetId);
        const current = state.units.get(state.attackTargetId);
        if (!previous || !current) {
          return;
        }
        if (current.lastHitTick > previous.lastHitTick) {
          state.attackFlashUntil = performance.now() + 180;
          spawnDamageText(current, current.lastDamage || 0);
        }
      }

      function leave() {
        sendPacket("leave", null);
        state.socket?.close();
      }

      function castSkill(slot) {
        const self = state.players.get(state.playerId);
        if (!self) {
          return;
        }
        const skillId = heroSkillSlots[els.heroId.value]?.[slot];
        if (!skillId) {
          return;
        }
        const target = state.moveTarget || { x: self.x, y: self.y };
        sendPacket("input", {
          cast: {
            skillId,
            targetX: target.x,
            targetY: target.y,
          },
          clientSeq: state.seq,
        });
      }

      function sendPacket(type, payload) {
        const socket = state.socket;
        if (!socket || socket.readyState !== WebSocket.OPEN) {
          return;
        }
        socket.send(
          JSON.stringify({
            type,
            roomId: state.roomId,
            playerId: state.playerId,
            seq: state.seq++,
            payload,
          }),
        );
      }

      function draw(ticker) {
        const frame = calculateFrame();
        drawMap(frame);
        syncUnits(frame);
        syncSprites(frame, ticker.deltaMS);
        syncDamageTexts(frame, ticker.deltaMS);
      }

      function calculateFrame() {
        const padding = 36;
        const scale = Math.min(
          (app.renderer.width - padding * 2) / state.map.width,
          (app.renderer.height - padding * 2) / state.map.height,
        );
        state.frame = {
          scale,
          offsetX: (app.renderer.width - state.map.width * scale) / 2,
          offsetY: (app.renderer.height - state.map.height * scale) / 2,
        };
        return state.frame;
      }

      function drawMap(frame) {
        gridLayer.clear();
        gridLayer.rect(
          frame.offsetX,
          frame.offsetY,
          state.map.width * frame.scale,
          state.map.height * frame.scale,
        );
        gridLayer.fill(0xbfd1bb);
        gridLayer.stroke({ color: 0x35594b, width: 3 });

        if (state.moveTarget) {
          gridLayer.circle(
            frame.offsetX + state.moveTarget.x * frame.scale,
            frame.offsetY + state.moveTarget.y * frame.scale,
            5,
          );
          gridLayer.fill(0x22c55e);
        }

        const selectedTarget = state.selectedTargetId
          ? state.units.get(state.selectedTargetId)
          : null;
        if (selectedTarget) {
          gridLayer.circle(
            frame.offsetX + selectedTarget.x * frame.scale,
            frame.offsetY + selectedTarget.y * frame.scale,
            Math.max(14, selectedTarget.radius * frame.scale + 6),
          );
          gridLayer.stroke({ color: 0xf6d365, width: 3 });
        }

        if (state.attackTargetId) {
          const self = state.players.get(state.playerId);
          const target = state.units.get(state.attackTargetId);
          const showAttackFlash =
            self?.stats &&
            target &&
            performance.now() < state.attackFlashUntil;
          if (showAttackFlash) {
            gridLayer.circle(
              frame.offsetX + self.x * frame.scale,
              frame.offsetY + self.y * frame.scale,
              self.stats.attackRange * frame.scale,
            );
            gridLayer.stroke({ color: 0x2f6fdd, width: 2, alpha: 0.75 });
          }
          if (target && target.id !== state.selectedTargetId) {
            gridLayer.circle(
              frame.offsetX + target.x * frame.scale,
              frame.offsetY + target.y * frame.scale,
              Math.max(14, target.radius * frame.scale + 6),
            );
            gridLayer.stroke({ color: 0xf6d365, width: 3 });
          }
        }
      }

      function syncSprites(frame, deltaMS) {
        const smoothing = 1 - Math.exp(-deltaMS / 80);

        for (const [playerId, sprite] of state.sprites) {
          if (!state.players.has(playerId)) {
            playerLayer.removeChild(sprite.node);
            state.sprites.delete(playerId);
          }
        }

        for (const player of state.players.values()) {
          let sprite = state.sprites.get(player.playerId);
          if (!sprite) {
            sprite = createPlayer(player);
            state.sprites.set(player.playerId, sprite);
            playerLayer.addChild(sprite.node);
          }

          sprite.targetX = player.x;
          sprite.targetY = player.y;
          redrawPlayerBody(sprite, player);
          updateBars(sprite, player.stats);
          sprite.x += (sprite.targetX - sprite.x) * smoothing;
          sprite.y += (sprite.targetY - sprite.y) * smoothing;
          sprite.node.x = frame.offsetX + sprite.x * frame.scale;
          sprite.node.y = frame.offsetY + sprite.y * frame.scale;
        }
      }

      function syncUnits(frame) {
        for (const [unitId, sprite] of state.unitSprites) {
          if (!state.units.has(unitId)) {
            unitLayer.removeChild(sprite.node);
            state.unitSprites.delete(unitId);
          }
        }

        for (const unit of state.units.values()) {
          let sprite = state.unitSprites.get(unit.id);
          if (!sprite) {
            sprite = createUnit(unit);
            state.unitSprites.set(unit.id, sprite);
            unitLayer.addChild(sprite.node);
          }
          updateBars(sprite, unit.stats);
          sprite.node.x = frame.offsetX + unit.x * frame.scale;
          sprite.node.y = frame.offsetY + unit.y * frame.scale;
        }
      }

      function createPlayer(player) {
        const node = new PIXI.Container();
        const body = new PIXI.Graphics();
        const hpBack = new PIXI.Graphics();
        const hpFill = new PIXI.Graphics();
        const mpBack = new PIXI.Graphics();
        const mpFill = new PIXI.Graphics();
        const label = new PIXI.Text({
          text: player.playerId,
          style: {
            fill: 0x172026,
            fontFamily: "Arial",
            fontSize: 13,
            fontWeight: "700",
          },
        });

        redrawPlayerBody({ body }, player);
        drawBar(hpBack, 0x24312b, 1, -29);
        drawBar(hpFill, 0xd94948, 1, -29);
        drawBar(mpBack, 0x24312b, 1, -23);
        drawBar(mpFill, 0x3b82f6, 1, -23);
        label.anchor.set(0.5, 0);
        label.y = 16;
        node.addChild(hpBack, hpFill, mpBack, mpFill, body, label);
        return {
          node,
          body,
          x: player.x,
          y: player.y,
          targetX: player.x,
          targetY: player.y,
          hpFill,
          mpFill,
        };
      }

      function redrawPlayerBody(sprite, player) {
        const isSelf = player.playerId === state.playerId;
        sprite.body.clear();
        sprite.body.circle(0, 0, isSelf ? 10 : 8);
        sprite.body.fill(colorForTeam(player.team));
        sprite.body.stroke({ color: isSelf ? 0xffffff : 0x172026, width: isSelf ? 2 : 1 });
      }

      function createUnit(unit) {
        const node = new PIXI.Container();
        const body = new PIXI.Graphics();
        const hpFill = new PIXI.Graphics();
        const visual = unitVisual(unit.kind);
        const label = new PIXI.Text({
          text: visual.label,
          style: {
            fill: 0x172026,
            fontFamily: "Arial",
            fontSize: 13,
            fontWeight: "700",
          },
        });

        drawUnitBody(body, visual, unit.radius);
        body.stroke({ color: 0xf2f7f3, width: 2 });
        drawBar(hpFill, 0xd94948, 1, -34);
        label.anchor.set(0.5, 0);
        label.y = unit.radius + 6;
        node.addChild(hpFill, body, label);
        return { node, hpFill };
      }

      function normalizeUnit(unit) {
        return {
          ...unit,
          kind: unit.kind || "dummy",
          team: unit.team || "neutral",
        };
      }

      function visibleUnits(snapshot) {
        const units = snapshot.units || snapshot.dummies || [];
        if (!state.showDummies) {
          return [];
        }
        return units.filter((unit) => (unit.kind || "dummy") === "dummy");
      }

      function normalizePlayer(player) {
        const isSelf = player.playerId === state.playerId;
        return {
          ...player,
          team: isSelf ? player.team || state.team : player.team || "unknown",
        };
      }

      function unitVisual(kind) {
        const visuals = {
          enemy_hero: { label: "Enemy Hero", color: 0xdc2626, shape: "circle" },
          siege_minion: { label: "Cannon", color: 0x6b7280, shape: "rect" },
          melee_minion: { label: "Melee", color: 0xf97316, shape: "circle" },
          ranged_minion: { label: "Ranged", color: 0xfacc15, shape: "diamond" },
          tower: { label: "Tower", color: 0x475569, shape: "tower" },
          crystal: { label: "Crystal", color: 0xa855f7, shape: "diamond" },
          barracks: { label: "Barracks", color: 0x7c2d12, shape: "rect" },
          dummy: { label: "Dummy", color: 0x8a5a32, shape: "rect" },
        };
        return visuals[kind] || { label: kind, color: 0x334155, shape: "circle" };
      }

      function drawUnitBody(body, visual, radius) {
        const size = Math.max(18, radius);
        if (visual.shape === "diamond") {
          body.moveTo(0, -size);
          body.lineTo(size, 0);
          body.lineTo(0, size);
          body.lineTo(-size, 0);
          body.closePath();
          body.fill(visual.color);
          return;
        }
        if (visual.shape === "tower") {
          body.rect(-size * 0.75, -size, size * 1.5, size * 2);
          body.fill(visual.color);
          body.rect(-size, -size * 1.3, size * 2, size * 0.45);
          body.fill(0x64748b);
          return;
        }
        if (visual.shape === "rect") {
          body.roundRect(-size, -size, size * 2, size * 2, 4);
          body.fill(visual.color);
          return;
        }
        body.circle(0, 0, size);
        body.fill(visual.color);
      }

      function spawnDamageText(target, damage) {
        if (!damage) {
          return;
        }
        const text = new PIXI.Text({
          text: `-${damage}`,
          style: {
            fill: 0xff3333,
            fontFamily: "Arial",
            fontSize: 15,
            fontWeight: "900",
            stroke: { color: 0xffffff, width: 2 },
          },
        });
        text.anchor.set(0.5, 0.5);
        effectLayer.addChild(text);
        state.damageTexts.push({
          node: text,
          x: target.x,
          y: target.y - 42,
          age: 0,
          lifetime: 720,
        });
      }

      function syncDamageTexts(frame, deltaMS) {
        for (let i = state.damageTexts.length - 1; i >= 0; i--) {
          const effect = state.damageTexts[i];
          effect.age += deltaMS;
          const progress = effect.age / effect.lifetime;
          if (progress >= 1) {
            effectLayer.removeChild(effect.node);
            state.damageTexts.splice(i, 1);
            continue;
          }
          effect.node.x = frame.offsetX + effect.x * frame.scale;
          effect.node.y = frame.offsetY + (effect.y - progress * 80) * frame.scale;
          effect.node.alpha = 1 - progress;
        }
      }

      function updateBars(sprite, stats) {
        if (!stats) {
          return;
        }
        drawBar(sprite.hpFill, 0xd94948, ratio(stats.hp, stats.maxHp), -29);
        if (sprite.mpFill) {
          drawBar(sprite.mpFill, 0x3b82f6, ratio(stats.mp, stats.maxMp), -23);
        }
      }

      function colorForTeam(team) {
        if (team === "red") {
          return 0xef4444;
        }
        if (team === "blue") {
          return 0x2563eb;
        }
        return 0x94a3b8;
      }

      function drawBar(graphics, color, value, y) {
        graphics.clear();
        graphics.roundRect(-18, y, 36 * value, 4, 1);
        graphics.fill(color);
      }

      function updatePositionLabel() {
        const self = state.players.get(state.playerId);
        if (!self) {
          els.position.textContent = "-";
          setStatsCard(null);
          return;
        }
        els.position.textContent = `${self.x.toFixed(1)}, ${self.y.toFixed(1)}`;
        els.teamLabel.textContent = self.team || state.team;
        setStatsCard(self);
        setTargetCard(currentTarget());
        if (!self.skills || self.skills.length === 0) {
          els.skills.textContent = "-";
          return;
        }
        const tick = Number(els.tick.textContent || 0);
        els.skills.textContent = self.skills
          .map((skill) => {
            const remain = Math.max(0, skill.cooldownUntilTick - tick);
            return `${skill.skillId}:${remain}`;
          })
          .join(" ");
      }

      function setStatus(value) {
        els.status.textContent = value;
      }

      function setStatsCard(player) {
        if (!player?.stats) {
          els.statLevel.textContent = "-";
          els.statExp.textContent = "-";
          els.statHp.textContent = "-";
          els.statMp.textContent = "-";
          els.statAttack.textContent = "-";
          els.statPhysicalDefense.textContent = "-";
          els.statMagicDefense.textContent = "-";
          els.statMoveSpeed.textContent = "-";
          els.statAttackRange.textContent = "-";
          els.statAttackSpeed.textContent = "-";
          return;
        }
        const stats = player.stats;
        els.statLevel.textContent = `${player.level || 1}/${player.maxLevel || 18}`;
        els.statExp.textContent =
          player.nextLevelExp > 0
            ? `${Math.floor(player.exp || 0)}/${Math.floor(player.nextLevelExp)}`
            : "MAX";
        els.statHp.textContent = `${stats.hp}/${stats.maxHp}`;
        els.statMp.textContent = `${stats.mp}/${stats.maxMp}`;
        els.statAttack.textContent = stats.attack;
        els.statPhysicalDefense.textContent = stats.physicalDefense;
        els.statMagicDefense.textContent = stats.magicDefense;
        els.statMoveSpeed.textContent = stats.moveSpeed;
        els.statAttackRange.textContent = stats.attackRange;
        els.statAttackSpeed.textContent = stats.attackSpeed;
      }

      function setTargetCard(target) {
        if (!target?.stats) {
          els.target.parentElement.style.display = "none";
          els.target.innerHTML = "-";
          return;
        }
        const stats = target.stats;
        els.target.parentElement.style.display = "block";
        els.target.innerHTML = `
          <div>${unitVisual(target.kind).label}</div>
          <div>${target.id}</div>
          <div>Team ${target.team || "-"}</div>
          <div>HP ${stats.hp}/${stats.maxHp}</div>
          <div>MP ${stats.mp}/${stats.maxMp}</div>
          <div>ATK ${stats.attack}</div>
          <div>Phys DEF ${stats.physicalDefense}</div>
          <div>Magic DEF ${stats.magicDefense}</div>
          <div>Move SPD ${stats.moveSpeed}</div>
          <div>ATK Range ${stats.attackRange}</div>
          <div>ATK SPD ${stats.attackSpeed}</div>
        `;
      }

      function websocketURL() {
        const scheme = location.protocol === "https:" ? "wss" : "ws";
        return `${scheme}://${location.host || "localhost:6969"}/ws`;
      }

      function handlePointerDown(event) {
        if (event.button === 0) {
          const targetId = pickTargetUnit(event);
          if (targetId) {
            state.selectedTargetId = targetId;
            setTargetCard(currentTarget());
            if (state.attackMoveArmed) {
              attackTarget(targetId);
              state.attackMoveArmed = false;
            }
            return;
          }
          state.selectedTargetId = "";
          state.attackMoveArmed = false;
          setTargetCard(null);
          return;
        }
        if (event.button !== 2) {
          return;
        }
        const point = screenToWorld(event);
        const targetId = pickTargetUnit(event);
        if (targetId) {
          state.selectedTargetId = targetId;
          setTargetCard(currentTarget());
          attackTarget(targetId);
          return;
        }
        moveToPoint(point);
      }

      function attackTarget(targetId) {
        state.attackTargetId = targetId;
        state.moveTarget = null;
        sendPacket("input", {
          attack: {
            targetId,
          },
          clientSeq: state.seq,
        });
      }

      function moveToPoint(point) {
        state.attackMoveArmed = false;
        state.attackTargetId = "";
        state.moveTarget = {
          x: clamp(point.x, 0, state.map.width),
          y: clamp(point.y, 0, state.map.height),
        };
        sendPacket("input", {
          move: {
            targetX: state.moveTarget.x,
            targetY: state.moveTarget.y,
          },
          clientSeq: state.seq,
        });
        clearAttackTarget();
      }

      function clearAttackTarget() {
        sendPacket("input", {
          attack: {
            clear: true,
          },
          clientSeq: state.seq,
        });
      }

      function currentTarget() {
        if (state.selectedTargetId) {
          return state.units.get(state.selectedTargetId) || null;
        }
        if (state.attackTargetId) {
          return state.units.get(state.attackTargetId) || null;
        }
        return null;
      }

      function pickTargetUnit(event) {
        const point = screenToWorld(event);
        const self = state.players.get(state.playerId);
        const units = [...state.units.values()]
          .filter((unit) => !self || unit.team !== self.team || unit.team === "neutral")
          .sort((a, b) => a.radius - b.radius);
        for (const unit of units) {
          if (hitTestUnit(point, unit)) {
            return unit.id;
          }
        }
        return "";
      }

      function hitTestUnit(point, unit) {
        const visual = unitVisual(unit.kind || "dummy");
        const size = Math.max(18, unit.radius);
        const padding = 4;
        const dx = Math.abs(point.x - unit.x);
        const dy = Math.abs(point.y - unit.y);
        if (visual.shape === "circle") {
          return Math.hypot(dx, dy) <= size + padding;
        }
        if (visual.shape === "tower") {
          return dx <= size + padding && dy <= size * 1.3 + padding;
        }
        return dx <= size + padding && dy <= size + padding;
      }

      function screenToWorld(event) {
        const rect = app.canvas.getBoundingClientRect();
        const canvasX = event.clientX - rect.left;
        const canvasY = event.clientY - rect.top;
        return {
          x: (canvasX - state.frame.offsetX) / state.frame.scale,
          y: (canvasY - state.frame.offsetY) / state.frame.scale,
        };
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function ratio(value, max) {
        if (!max || max <= 0) {
          return 0;
        }
        return clamp(value / max, 0, 1);
      }

      window.addEventListener("keydown", (event) => {
        const slot = event.key.toLowerCase();
        if (slot === "a") {
          event.preventDefault();
          state.attackMoveArmed = true;
          return;
        }
        if (!["q", "w", "e", "r"].includes(slot)) {
          return;
        }
        event.preventDefault();
        castSkill(slot);
      });

      els.connectBtn.addEventListener("click", connect);
      els.leaveBtn.addEventListener("click", leave);

      bootPixi();
    </script>
  </body>
</html>
