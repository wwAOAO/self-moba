syntax = "proto3";

package battle.protocol;

option go_package = "l-battle/internal/protocol;protocol";

message Packet {
  string type = 1;
  string room_id = 2;
  string player_id = 3;
  uint64 seq = 4;
  bytes payload = 5;
}

message JoinRoom {
  string room_id = 1;
  string player_id = 2;
  string hero_id = 3;
  string team = 4;
}

message PlayerInput {
  double move_x = 1;
  double move_y = 2;
  uint64 client_seq = 3;
  CastInput cast = 4;
  AttackInput attack = 5;
  MoveInput move = 6;
  UpgradeSkillInput upgrade_skill = 7;
  bool debug_level_up = 8;
}

message MoveInput {
  double target_x = 1;
  double target_y = 2;
}

message AttackInput {
  string target_id = 1;
  bool clear = 2;
}

message CastInput {
  string skill_id = 1;
  string target_id = 2;
  double target_x = 3;
  double target_y = 4;
}

message UpgradeSkillInput {
  string slot = 1;
}

message SpawnObject {
  string kind = 1;
  string team = 2;
  double x = 3;
  double y = 4;
}

message Snapshot {
  string room_id = 1;
  uint64 tick = 2;
  MapSnapshot map = 3;
  repeated PlayerSnapshot players = 4;
  repeated DummySnapshot dummies = 5;
  repeated UnitSnapshot units = 6;
  repeated EffectSnapshot effects = 7;
}

message MapSnapshot {
  double width = 1;
  double height = 2;
}

message PlayerSnapshot {
  string player_id = 1;
  string hero_id = 2;
  string team = 3;
  int32 level = 4;
  int32 max_level = 5;
  int32 skill_points = 6;
  double exp = 7;
  double total_exp = 8;
  double next_level_exp = 9;
  double x = 10;
  double y = 11;
  StatsSnapshot stats = 12;
  repeated SkillSnapshot skills = 13;
  PassiveSnapshot passive = 14;
  uint64 last_hit_tick = 15;
  int32 last_damage = 16;
  string last_damage_type = 17;
  bool dead = 18;
  uint64 respawn_tick = 19;
  double respawn_in = 20;
  ControlSnapshot control = 21;
  WarriorSnapshot warrior = 22;
  SwordSnapshot sword = 23;
  TankSnapshot tank = 24;
  ArcherSnapshot archer = 25;
}

message StatsSnapshot {
  int32 hp = 1;
  int32 max_hp = 2;
  int32 bonus_hp = 3;
  double mp = 4;
  double max_mp = 5;
  double hp_regen5 = 6;
  double mp_regen5 = 7;
  double attack = 8;
  double bonus_attack = 9;
  int32 ability_power = 10;
  double damage_reduce = 11;
  double physical_defense = 12;
  double bonus_physical_defense = 13;
  double physical_pen_percent = 14;
  double physical_pen_flat = 15;
  double physical_damage_reduce = 16;
  double magic_defense = 17;
  double bonus_magic_defense = 18;
  double magic_pen_percent = 19;
  double magic_pen_flat = 20;
  double magic_damage_reduce = 21;
  double move_speed = 22;
  double attack_range = 23;
  double attack_speed = 24;
  double base_attack_speed = 25;
  double attack_speed_bonus = 26;
  double attack_speed_ratio = 27;
  double attack_speed_slow = 28;
  double crit_chance = 29;
}

message DummySnapshot {
  string id = 1;
  double x = 2;
  double y = 3;
  double radius = 4;
  StatsSnapshot stats = 5;
  uint64 last_hit_tick = 6;
  int32 last_damage = 7;
  string last_damage_type = 8;
}

message UnitSnapshot {
  string id = 1;
  string kind = 2;
  string team = 3;
  double x = 4;
  double y = 5;
  double radius = 6;
  StatsSnapshot stats = 7;
  uint64 last_hit_tick = 8;
  int32 last_damage = 9;
  string last_damage_type = 10;
  ControlSnapshot control = 11;
}

message EffectSnapshot {
  string id = 1;
  string kind = 2;
  string team = 3;
  double x = 4;
  double y = 5;
  double end_x = 6;
  double end_y = 7;
  double dir_x = 8;
  double dir_y = 9;
  double width = 10;
  double height = 11;
  double radius = 12;
  double range = 13;
  double speed = 14;
  uint64 created_at = 15;
  uint64 expires_at = 16;
}

message SkillSnapshot {
  string skill_id = 1;
  int32 level = 2;
  uint64 cooldown_until_tick = 3;
  int32 stacks = 4;
  uint64 stacks_expire_tick = 5;
}

message PassiveSnapshot {
  double sword_intent = 1;
  double max_sword_intent = 2;
  int32 shield = 3;
  int32 max_shield = 4;
}

message ControlSnapshot {
  uint64 airborne_until_tick = 1;
  uint64 dash_until_tick = 2;
  uint64 action_locked_until_tick = 3;
  uint64 silenced_until_tick = 4;
  uint64 tenacity_until_tick = 5;
  double move_speed_slow = 6;
  uint64 move_speed_slow_until = 7;
  uint64 stunned_until_tick = 8;
}

message WarriorSnapshot {
  uint64 judgment_until_tick = 1;
}

message TankSnapshot {
  uint64 thunderclap_aftershock_until = 1;
}

message ArcherSnapshot {
  int32 focus_stacks = 1;
  uint64 focus_expire_tick = 2;
  uint64 focus_active_until = 3;
  double focus_attack_speed = 4;
}

message SwordSnapshot {
  map<string, uint64> sweeping_blade_target_until = 1;
}

message Error {
  string message = 1;
}
