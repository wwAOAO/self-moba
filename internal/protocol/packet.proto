syntax = "proto3";

package battle.protocol;

option go_package = "l-battle/internal/protocol;protocol";

message Packet {
  string type = 1;
  string room_id = 2;
  string player_id = 3;
  uint64 seq = 4;
  bytes payload = 5;
}

message JoinRoom {
  string room_id = 1;
  string player_id = 2;
  string hero_id = 3;
  string team = 4;
}

message PlayerInput {
  double move_x = 1;
  double move_y = 2;
  uint64 client_seq = 3;
  CastInput cast = 4;
  AttackInput attack = 5;
  MoveInput move = 6;
  UpgradeSkillInput upgrade_skill = 7;
  bool debug_level_up = 8;
  double debug_ability_haste = 9;
  BuyEquipmentInput buy_equipment = 10;
  SellEquipmentInput sell_equipment = 11;
  double debug_gold = 12;
}

message MoveInput {
  double target_x = 1;
  double target_y = 2;
}

message AttackInput {
  string target_id = 1;
  bool clear = 2;
}

message CastInput {
  string skill_id = 1;
  string target_id = 2;
  double target_x = 3;
  double target_y = 4;
}

message UpgradeSkillInput {
  string slot = 1;
}

message BuyEquipmentInput {
  string equipment_id = 1;
}

message SellEquipmentInput {
  int32 slot = 1;
}

message SpawnObject {
  string kind = 1;
  string team = 2;
  double x = 3;
  double y = 4;
}

message Snapshot {
  string room_id = 1;
  uint64 tick = 2;
  MapSnapshot map = 3;
  repeated PlayerSnapshot players = 4;
  repeated DummySnapshot dummies = 5;
  repeated UnitSnapshot units = 6;
  repeated EffectSnapshot effects = 7;
}

message MapSnapshot {
  double width = 1;
  double height = 2;
}

message PlayerSnapshot {
  // Identity and progression.
  string player_id = 1;
  string hero_id = 2;
  string team = 3;
  int32 level = 4;
  int32 max_level = 5;
  int32 skill_points = 6;
  double gold = 7;
  repeated EquipmentSlot equipment = 8;
  double exp = 9;
  double total_exp = 10;
  double next_level_exp = 11;
  string message = 12;
  uint64 message_tick = 13;
  // Transform and combat state.
  double x = 14;
  double y = 15;
  StatsSnapshot stats = 16;
  repeated SkillSnapshot skills = 17;
  PassiveSnapshot passive = 18;
  uint64 last_hit_tick = 19;
  int32 last_damage = 20;
  string last_damage_type = 21;
  bool dead = 22;
  uint64 respawn_tick = 23;
  double respawn_in = 24;
  ControlSnapshot control = 25;
  // Hero-specific public state.
  WarriorSnapshot warrior = 26;
  SwordSnapshot sword = 27;
  TankSnapshot tank = 28;
  ArcherSnapshot archer = 29;
  repeated BuffSnapshot buffs = 30;
  repeated DamageEventSnapshot damage_events = 31;
  NinjaSnapshot ninja = 32;
}

message BuffSnapshot {
  string id = 1;
  string name = 2;
  uint64 expires_at_tick = 3;
  bool negative = 4;
  double ability_haste = 5;
}

message EquipmentSlot {
  string equipment_id = 1;
  string name = 2;
  int32 stacks = 3;
}

message StatsSnapshot {
  // Health and resources.
  int32 hp = 1;
  int32 max_hp = 2;
  int32 bonus_hp = 3;
  double mp = 4;
  double max_mp = 5;
  double hp_regen5 = 6;
  double mp_regen5 = 7;

  // Offensive stats.
  double attack = 8;
  double bonus_attack = 9;
  int32 ability_power = 10;
  double ability_haste = 11;
  double damage_reduce = 12;

  // Defenses and penetration.
  double physical_defense = 13;
  double bonus_physical_defense = 14;
  double physical_pen_percent = 15;
  double physical_pen_flat = 16;
  double physical_damage_reduce = 17;
  double magic_defense = 18;
  double bonus_magic_defense = 19;
  double magic_pen_percent = 20;
  double magic_pen_flat = 21;
  double magic_damage_reduce = 22;

  // Movement, attacks, and sustain.
  double move_speed = 23;
  double attack_range = 24;
  double attack_speed = 25;
  double base_attack_speed = 26;
  double attack_speed_bonus = 27;
  double attack_speed_ratio = 28;
  double attack_speed_slow = 29;
  double crit_chance = 30;
  double omnivamp = 31;
  double life_steal = 32;
  double healing_power = 33;
  double grievous_wounds = 34;
}

message DummySnapshot {
  string id = 1;
  double x = 2;
  double y = 3;
  double radius = 4;
  StatsSnapshot stats = 5;
  uint64 last_hit_tick = 6;
  int32 last_damage = 7;
  string last_damage_type = 8;
  repeated DamageEventSnapshot damage_events = 9;
  repeated BuffSnapshot buffs = 10;
}

message UnitSnapshot {
  string id = 1;
  string kind = 2;
  string team = 3;
  double x = 4;
  double y = 5;
  double radius = 6;
  StatsSnapshot stats = 7;
  uint64 last_hit_tick = 8;
  int32 last_damage = 9;
  string last_damage_type = 10;
  ControlSnapshot control = 11;
  repeated DamageEventSnapshot damage_events = 12;
  repeated BuffSnapshot buffs = 13;
}

message DamageEventSnapshot {
  int32 damage = 1;
  string damage_type = 2;
  bool basic_attack = 3;
  string source_id = 4;
}

message EffectSnapshot {
  string id = 1;
  string kind = 2;
  string team = 3;
  double x = 4;
  double y = 5;
  double end_x = 6;
  double end_y = 7;
  double dir_x = 8;
  double dir_y = 9;
  double width = 10;
  double height = 11;
  double radius = 12;
  double range = 13;
  double speed = 14;
  uint64 created_at = 15;
  uint64 expires_at = 16;
  int32 count = 17;
  string source_hero_id = 18;
  string source_id = 19;
}

message SkillSnapshot {
  string skill_id = 1;
  int32 level = 2;
  uint64 cooldown_until_tick = 3;
  int32 stacks = 4;
  uint64 stacks_expire_tick = 5;
}

message PassiveSnapshot {
  double sword_intent = 1;
  double max_sword_intent = 2;
  int32 shield = 3;
  int32 max_shield = 4;
  map<string, uint64> ninja_soul_cooldowns = 5;
}

message ControlSnapshot {
  // Action locks and hard crowd control.
  uint64 airborne_until_tick = 1;
  uint64 dash_until_tick = 2;
  uint64 action_locked_until_tick = 3;
  uint64 silenced_until_tick = 4;
  uint64 tenacity_until_tick = 5;
  // Soft movement control.
  double move_speed_slow = 6;
  uint64 move_speed_slow_until = 7;
  uint64 stunned_until_tick = 8;
  uint64 rooted_until_tick = 9;
  uint64 mage_illumination_until = 10;
}

message WarriorSnapshot {
  uint64 judgment_until_tick = 1;
}

message TankSnapshot {
  uint64 thunderclap_aftershock_until = 1;
}

message ArcherSnapshot {
  int32 focus_stacks = 1;
  uint64 focus_expire_tick = 2;
  uint64 focus_active_until = 3;
  double focus_attack_speed = 4;
}

message SwordSnapshot {
  map<string, uint64> sweeping_blade_target_until = 1;
}

message NinjaSnapshot {
  double shadow_x = 1;
  double shadow_y = 2;
  uint64 shadow_expires_at = 3;
  uint64 shadow_ready_tick = 4;
  double r_shadow_x = 5;
  double r_shadow_y = 6;
  uint64 r_shadow_expires_at = 7;
  string shadow_recast_skill_id = 8;
  uint64 r_shadow_recast_until = 9;
}

message Error {
  string message = 1;
}
